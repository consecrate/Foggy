<!-- Foggy LeetCode-style coding UI template -->
<div id="foggy-container">
  <!-- App header -->
  <div id="foggy-header">
    <button id="foggy-home-btn" type="button" aria-label="Return to home" title="Return to Decks">
      <span class="foggy-panel-icon foggy-home-icon" data-icon="close" aria-hidden="true"></span>
    </button>
    <!-- Hidden elements kept for JS compatibility -->
    <span id="foggy-header-state" class="is-hidden"></span>
    <span id="foggy-header-title" class="is-hidden"></span>
    <div id="foggy-lang-badge" class="is-hidden"></div>
    <div id="foggy-difficulty-badge" class="is-hidden"></div>
    <button id="foggy-run-btn" type="button" class="is-hidden">Run</button>
    <div class="foggy-header-spacer"></div>
    <button id="foggy-check-btn" type="button">
      <span class="foggy-panel-icon foggy-check-icon" data-icon="check" aria-hidden="true"></span>
      Check
    </button>
  </div>

  <!-- CSS Grid split layout -->
  <div id="foggy-grid">
    <!-- Left: problem description -->
    <div id="foggy-left-wrapper">
      <div class="foggy-panel-header">
        <div class="foggy-panel-tab active">
          <span class="foggy-panel-icon" data-icon="description" aria-hidden="true"></span>
          <span class="foggy-panel-title">Description</span>
        </div>
      </div>
      <div id="foggy-problem">
        <h2 id="foggy-title"></h2>
        <div id="foggy-description"></div>
      </div>
    </div>

    <!-- Column gutter (draggable) -->
    <div class="gutter-col" id="foggy-gutter-col"></div>

    <!-- Right column: editor + bottom panel -->
    <div id="foggy-right">
      <!-- Code editor -->
      <div id="foggy-top-wrapper">
        <div class="foggy-panel-header">
          <div class="foggy-panel-tab active">
            <span class="foggy-panel-icon" data-icon="code" aria-hidden="true"></span>
            <span class="foggy-panel-title">Code</span>
          </div>
        </div>
        <div id="foggy-editor"></div>
      </div>

      <!-- Row gutter (draggable) -->
      <div class="gutter-row" id="foggy-gutter-row"></div>

      <!-- Bottom panel: Testcase / Test Result tabs -->
      <div id="foggy-bottom-panel">
        <div class="foggy-panel-header">
          <div class="foggy-panel-tab active" data-tab="testcase">
            <span class="foggy-panel-icon" data-icon="testcase" aria-hidden="true"></span>
            <span class="foggy-panel-title">Testcase</span>
          </div>
          <div class="foggy-tab-divider"></div>
          <div class="foggy-panel-tab" data-tab="result">
            <span class="foggy-panel-icon" data-icon="test-result" aria-hidden="true"></span>
            <span class="foggy-panel-title">Test Result</span>
          </div>
          <div class="foggy-tab-divider is-hidden" id="foggy-solution-divider"></div>
          <div class="foggy-panel-tab is-hidden" data-tab="solution" id="foggy-solution-tab-btn">
            <span class="foggy-panel-icon" data-icon="solution" aria-hidden="true"></span>
            <span class="foggy-panel-title">Solution</span>
          </div>
        </div>
        <div class="foggy-tab-content" id="foggy-tab-testcase">
          <div id="foggy-testcase-content">
            <span class="foggy-hint">Loading test cases…</span>
          </div>
        </div>
        <div class="foggy-tab-content is-hidden" id="foggy-tab-result">
          <div id="foggy-results-content">
            <span class="foggy-hint">Press Run to execute your code</span>
          </div>
        </div>
        <div class="foggy-tab-content is-hidden" id="foggy-tab-solution">
          <pre id="foggy-solution-content"><span class="foggy-hint">Solution unavailable</span></pre>
        </div>
      </div>
    </div>
  </div>
</div>
